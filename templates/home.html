{% extends "base.html" %}

{% block title %}SquatCheck{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="title-serif" style="font-size: 72px;">SquatCheck</h1>
    <p class="text-muted" style="font-size: 20px;">Learn to spot compensation patterns in a squat</p>

    <form method="POST" action="/start" class="mt-5">
        <button type="submit" class="btn btn-squat-primary btn-lg">Start Learning</button>
    </form>

    <p class="text-muted fst-italic mt-4" style="font-size: 14px;">
        Subgoal: User chooses to begin the lesson.
    </p>
</div>
{% endblock %}

{% block nav %}{% endblock %}
